version: '3.8'

services:
  cassandra1:
    image: cassandra:latest
    container_name: cassandra1
    restart: unless-stopped
    network_mode: host
    environment:
      - MAX_HEAP_SIZE=512M          # ← очень важно для теста
      - HEAP_NEWSIZE=100M
      - CASSANDRA_CLUSTER_NAME=MyTestCluster
      - CASSANDRA_LISTEN_ADDRESS=192.168.1.200
      - CASSANDRA_BROADCAST_ADDRESS=192.168.1.200
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - CASSANDRA_BROADCAST_RPC_ADDRESS=192.168.1.200
      - CASSANDRA_SEEDS=192.168.1.200
    deploy:                          # или resources: (в compose v3)
      resources:
        limits:
          cpus: '0.8'                # ограничиваем CPU
          memory: 800M               # общий лимит на контейнер
        reservations:
          cpus: '0.5'
          memory: 600M

